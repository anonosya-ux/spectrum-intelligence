<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Intelligence | Коммерческое предложение</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav id="nav">
    <div class="nav-logo">◆ SPECTRUM</div>
    <a href="#pitch" class="nav-cta">Смотреть КП</a>
</nav>

<section class="hero" id="hero">
    <div class="hero-content">
        <div class="tag"><div class="dot"></div>КОММЕРЧЕСКОЕ ПРЕДЛОЖЕНИЕ</div>
        <h1 class="hero-title">
            <span class="word">Spectrum</span>
            <span class="word accent">Intelligence</span>
        </h1>
        <p class="hero-subtitle">Технологический рывок и оптимизация издержек. От ручного труда — к строгой математической оптимизации.</p>
        <div class="scroll-cue">
            <div class="mouse"></div>
            <span>Скролльте вниз</span>
        </div>
    </div>
</section>

<section class="pitch-deck" id="pitch">
    <div class="stack-container">
        <!-- Generates 16 cards -->
        <script>
            for(let i=1; i<=16; i++) {
                document.write(`
                <div class="card" id="card-${i}">
                    <div class="card-inner">
                        <img src="Изображение ${i}.jpg" alt="Слайд ${i}" class="slide-img">
                    </div>
                </div>
                `);
            }
        </script>
    </div>
</section>

<section class="cta-section">
    <div class="cta-content">
        <h2 class="cta-title">Начнем внедрение?</h2>
        <p class="cta-subtitle">Для старта MVP необходима тестовая DWG-подоснова и справочник 1С (CSV).</p>
        <div class="cta-buttons">
            <button class="btn btn-primary">Передать DWG →</button>
            <button class="btn btn-secondary">Выгрузить 1С</button>
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
<script src="app.js"></script>
</body>
</html>
