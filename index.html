<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Intelligence | Коммерческое предложение</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="preloader">
    <div class="pl-inner">
        <div class="pl-brand">SPECTRUM INTELLIGENCE</div>
        <div class="pl-bar"><div class="pl-fill"></div></div>
        <div class="pl-pct">0%</div>
    </div>
</div>

<canvas id="webgl-canvas"></canvas>

<div id="ui">
    <div class="ui-top">
        <div class="logo">◆ SPECTRUM</div>
        <div class="slide-count"><span id="curr-slide">01</span> / 16</div>
    </div>
    <div class="ui-bottom">
        <div class="scroll-ind">
            <div class="mouse-icon"><div class="wheel"></div></div>
            <span>SCROLL TO EXPLORE</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

<div id="scroll-proxy"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
<script src="app.js"></script>
</body>
</html>
